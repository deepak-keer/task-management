<div style="margin:0;background:#020617;padding:28px 16px;font-family:Inter,Arial,sans-serif;color:#e2e8f0">
  <div style="max-width:640px;margin:0 auto;background:#0f172a;border:1px solid #1e293b;border-radius:12px;overflow:hidden">
    <div style="padding:22px 26px;border-bottom:1px solid #1e293b;background:#111827">
      <div style="font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#60a5fa">TaskFlow</div>
      <h1 style="margin:10px 0 0;font-size:22px;line-height:1.25;color:#f8fafc">{{title}}</h1>
    </div>
    <div style="padding:26px">
      <p style="margin:0 0 14px;color:#cbd5e1">Hello {{userName}},</p>
      <p style="margin:0 0 22px;color:#e2e8f0;font-size:15px;line-height:1.6">{{message}}</p>
      <div style="border:1px solid #334155;background:#111827;border-radius:10px;padding:16px;margin-bottom:22px">
        <p style="margin:0 0 10px;color:#f8fafc;font-size:16px;font-weight:700">{{taskTitle}}</p>
        <p style="margin:0 0 8px;color:#94a3b8"><strong style="color:#cbd5e1">Project:</strong> {{projectName}}</p>
        <p style="margin:0 0 8px;color:#94a3b8"><strong style="color:#cbd5e1">Assigned by:</strong> {{actorName}}</p>
        <p style="margin:0;color:#94a3b8"><strong style="color:#cbd5e1">Time:</strong> {{timestamp}}</p>
      </div>
      <a href="{{actionUrl}}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:8px;font-weight:700">View in TaskFlow</a>
      <p style="margin:24px 0 0;font-size:12px;line-height:1.5;color:#64748b">You are receiving this because email notifications are enabled. Manage preferences: {{preferencesUrl}}</p>
    </div>
  </div>
</div>
