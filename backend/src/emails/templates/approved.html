<div style="margin:0;background:#f8fafc;padding:24px;font-family:Arial,sans-serif;color:#0f172a">
  <div style="max-width:620px;margin:0 auto;background:#ffffff;border:1px solid #e2e8f0;border-radius:10px;padding:28px">
    <h1 style="margin:0 0 12px;font-size:22px;color:#0f172a">{{title}}</h1>
    <p style="margin:0 0 16px">Hello {{userName}},</p>
    <p style="margin:0 0 20px">{{message}}</p>
    <div style="background:#f0fdf4;border-radius:8px;padding:16px;margin-bottom:20px">
      <p style="margin:0 0 6px"><strong>Task:</strong> {{taskTitle}}</p>
      <p style="margin:0 0 6px"><strong>Project:</strong> {{projectName}}</p>
      <p style="margin:0 0 6px"><strong>Approved by:</strong> {{actorName}}</p>
      <p style="margin:0"><strong>Time:</strong> {{timestamp}}</p>
    </div>
    <a href="{{actionUrl}}" style="display:inline-block;background:#16a34a;color:#ffffff;text-decoration:none;padding:11px 16px;border-radius:8px;font-weight:bold">View approval</a>
    <p style="margin:24px 0 0;font-size:12px;color:#64748b">Manage email preferences: {{preferencesUrl}}</p>
  </div>
</div>
